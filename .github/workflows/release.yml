name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          OLD_VERSION=$(node -e "console.log(require('./package.json').version)")
          NEW_VERSION=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          NEW_VERSION="${NEW_VERSION#v}"
          echo "old=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping $OLD_VERSION → $NEW_VERSION"

      - name: Update CHANGELOG
        run: |
          VERSION="${{ steps.bump.outputs.new }}"
          DATE=$(date +%Y-%m-%d)
          PREV="${{ steps.bump.outputs.old }}"

          sed -i "s/^## \[Unreleased\]/## [Unreleased]\n\n## [$VERSION] - $DATE/" CHANGELOG.md

          if git tag | grep -q "v$PREV"; then
            sed -i "s|^\[Unreleased\]:.*|[Unreleased]: https://github.com/p8n-ai/pi-remembers/compare/v$VERSION...HEAD\n[$VERSION]: https://github.com/p8n-ai/pi-remembers/compare/v$PREV...v$VERSION|" CHANGELOG.md
          else
            sed -i "s|^\[Unreleased\]:.*|[Unreleased]: https://github.com/p8n-ai/pi-remembers/compare/v$VERSION...HEAD\n[$VERSION]: https://github.com/p8n-ai/pi-remembers/releases/tag/v$VERSION|" CHANGELOG.md
          fi

      - name: Commit and push
        run: |
          VERSION="${{ steps.bump.outputs.new }}"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "release: v$VERSION"
          git push origin main

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.bump.outputs.new }}"
          BODY=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)
          echo "$BODY" > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.bump.outputs.new }}"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file /tmp/release-notes.md
